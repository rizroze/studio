      #loader{position:fixed;inset:0;z-index:99999;background:rgb(0,0,0);display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease,filter 0.4s ease}

      #loader.loader-exit{opacity:0;filter:blur(8px);pointer-events:none}
      #loader.loader-hidden{display:none}
      .loader-inner{text-align:center;position:relative;z-index:1}
      .loader-avatar{width:48px;height:48px;display:block;margin:0 auto;border-radius:10px}
      .loader-text{margin-top:12px;font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:0.02em;text-align:center}
