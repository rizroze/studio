    <style>
      body{margin:0;font-family:'Inter Tight',sans-serif;background-color:rgb(0,0,0);color:#fff}
      #loader{position:fixed;inset:0;z-index:99999;background:rgb(59,3,3);display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease,filter 0.4s ease}
      #loader::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(168,85,247,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 30%,rgba(252,225,132,0.06) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(74,222,128,0.04) 0%,transparent 50%);pointer-events:none}
      #loader.loader-exit{opacity:0;filter:blur(8px);pointer-events:none}
      #loader.loader-hidden{display:none}
      .loader-inner{position:relative;z-index:1}
      .loader-yinyang{width:32px;height:32px;position:relative;margin:0 auto;animation:loader-spin 1.8s cubic-bezier(0.4,0,0.2,1) infinite}
      .loader-dot{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5)}
      .loader-dot:nth-child(1){top:0;left:50%;transform:translateX(-50%)}
      .loader-dot:nth-child(2){bottom:0;left:50%;transform:translateX(-50%);opacity:0.25}
      @keyframes loader-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fragment+Mono&family=Urbanist:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

<body>
    <div id="loader">

      </div>
    </div>
    <div id="root"></div>

    <script>setTimeout(function(){var l=document.getElementById('loader');if(l)l.classList.add('loader-exit');setTimeout(function(){if(l)l.classList.add('loader-hidden')},250)},250)</script>
